name: API Tests

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v3

      - name: Clone API repo
        run: git clone https://github.com/propeller-commerce/propeller-sdet-task-viktorija-todosieva.git api

      - name: Start API with Docker Compose
        run: |
          cd api
          docker-compose up --build -d

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000/graphql && break
            echo "Waiting for API..."
            sleep 2
          done

      - name: Seed database
        run: |
          cd api
          docker-compose --profile seed run --rm seed

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test